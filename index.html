<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบขอให้ดำเนินการกิจกรรมนักศึกษา</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Prompt,Sarabun,sans-serif;background:#eef7f3;margin:0;padding:20px;color:#123}
.container{max-width:1100px;margin:auto;background:#fff;border-radius:20px;padding:25px;box-shadow:0 8px 24px #0001}
h1{text-align:center;color:#0b684d}
h2{color:#0b684d}
input,select,textarea{width:100%;padding:10px;margin:6px 0 14px;border:1px solid #ccc;border-radius:10px}
textarea{min-height:90px}
button{background:#0b684d;color:white;border:0;border-radius:12px;padding:12px 20px;cursor:pointer;font-weight:bold}
button.gray{background:#64748b}
button.red{background:#b91c1c}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:18px;margin:18px 0}
.hidden{display:none}
.nav{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.badge{padding:6px 12px;border-radius:20px;background:#dbeafe}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ddd;padding:8px;vertical-align:top}
th{background:#dcfce7}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="container">
<h1>ระบบขอให้ดำเนินการกิจกรรมนักศึกษา</h1>
<p style="text-align:center">ระบบ Check-In / Passcode</p>

<div id="menu" class="nav hidden">
<button onclick="showPage('requestPage')">ส่งคำขอ</button>
<button onclick="loadMyRequests()">ติดตามสถานะ</button>
<button onclick="showPage('profilePage')">ข้อมูลผู้ใช้งาน</button>
<button id="adminBtn" class="gray hidden" onclick="loadAdmin()">Admin</button>
<button class="red" onclick="logout()">ออกจากระบบ</button>
</div>

<div id="loginPage">
<div class="card">
<h2>เข้าสู่ระบบ</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">เข้าสู่ระบบ</button>
<button class="gray" onclick="showPage('registerPage')">สมัครผู้ใช้งานทั่วไป</button>
</div>
</div>

<div id="registerPage" class="hidden">
<div class="card">
<h2>สมัครผู้ใช้งานทั่วไป</h2>
<input id="regFullname" placeholder="ชื่อ - สกุล">
<select id="regOrgType">
<option value="คณะ">คณะ</option>
<option value="หน่วยงานภายในมหาวิทยาลัย">หน่วยงานภายในมหาวิทยาลัย</option>
</select>
<select id="regFaculty">
<option>ครุศาสตร์</option>
<option>มนุษยศาสตร์และสังคมศาสตร์</option>
<option>วิทยาศาสตร์และเทคโนโลยี</option>
<option>วิทยาการจัดการ</option>
<option>หน่วยงานภายในมหาวิทยาลัย</option>
</select>
<input id="regPhone" placeholder="เบอร์โทร">
<input id="regLine" placeholder="LineID">
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">สมัครใช้งาน</button>
<button class="gray" onclick="showPage('loginPage')">กลับเข้าสู่ระบบ</button>
</div>
</div>

<div id="profilePage" class="hidden">
<div class="card">
<h2>ข้อมูลผู้ใช้งาน</h2>
<input id="pfFullname" placeholder="ชื่อ - สกุล">
<select id="pfOrgType">
<option value="คณะ">คณะ</option>
<option value="หน่วยงานภายในมหาวิทยาลัย">หน่วยงานภายในมหาวิทยาลัย</option>
</select>
<input id="pfOrg" placeholder="หน่วยงาน">
<input id="pfPhone" placeholder="เบอร์โทร">
<input id="pfLine" placeholder="LineID">
<button onclick="updateProfile()">บันทึกข้อมูล</button>
</div>
</div>

<div id="requestPage" class="hidden">
<div class="card">
<h2>ส่งคำขอกิจกรรม</h2>

<input id="activityName" placeholder="ชื่อกิจกรรม">

<label><input type="checkbox" id="typeCheckIn" onchange="toggleTypes()"> Check-In เฉพาะปี 1 รหัส 169</label>
<label><input type="checkbox" id="typePasscode" onchange="toggleTypes()"> Passcode เฉพาะปี 2-4 รหัส 166-168</label>

<div class="grid">
<div><label>วันที่จัดกิจกรรม</label><input id="activityDate" type="date"></div>
<div><label>จำนวนผู้เข้าร่วม</label><input id="participants" type="number"></div>
<div><label>เวลาเริ่มกิจกรรม</label><input id="startTime" type="time"></div>
<div><label>เวลาสิ้นสุดกิจกรรม</label><input id="endTime" type="time"></div>
</div>

<input id="place" placeholder="สถานที่จัดกิจกรรม">

<div id="checkInBox" class="card hidden">
<h2>ข้อมูลระบบ Check-In</h2>
<div class="grid">
<div><label>Check-In เริ่มต้น</label><input id="checkInStart" type="time"></div>
<div><label>Check-In สิ้นสุด</label><input id="checkInEnd" type="time"></div>
<div><label>Check-Out เริ่มต้น</label><input id="checkOutStart" type="time"></div>
<div><label>Check-Out สิ้นสุด</label><input id="checkOutEnd" type="time"></div>
</div>
<input id="locationCheckIn" placeholder="Location Check-In">
<input id="locationCheckOut" placeholder="Location Check-Out">
<textarea id="checkInDetail" placeholder="รายละเอียดกิจกรรมที่ต้องการแจ้ง"></textarea>
<input id="banner" placeholder="ลิงก์ภาพแบนเนอร์กิจกรรม หากไม่กรอกใช้ตรามหาวิทยาลัยแทน">
<select id="checkInLevel"></select>
</div>

<div id="passcodeBox" class="card hidden">
<h2>ข้อมูลระบบ Passcode</h2>
<label><input type="checkbox" class="pcYear" value="ชั้นปีที่ 2 รหัส 168"> ชั้นปีที่ 2 รหัส 168</label>
<label><input type="checkbox" class="pcYear" value="ชั้นปีที่ 3 รหัส 167"> ชั้นปีที่ 3 รหัส 167</label>
<label><input type="checkbox" class="pcYear" value="ชั้นปีที่ 4 รหัส 166"> ชั้นปีที่ 4 รหัส 166</label>
<select id="passcodeLevel"></select>
</div>

<div class="card">
<h2>เอกสารประกอบการขอ</h2>
<input id="documentLink" placeholder="Link Google Drive">
<label><input type="checkbox" id="hasSchedule"> กำหนดการกิจกรรม</label>
<label><input type="checkbox" id="hasStudentList"> รายชื่อนักศึกษาผู้เข้าร่วมกิจกรรม</label>
</div>

<button onclick="createRequest()">ส่งคำขอ</button>
</div>
</div>

<div id="myStatusPage" class="hidden">
<div class="card">
<h2>ติดตามสถานะคำขอกิจกรรม</h2>
<div id="myRequests"></div>
</div>
</div>

<div id="adminPage" class="hidden">
<div class="card">
<h2>Admin : รายการคำขอทั้งหมด</h2>
<div id="adminRequests"></div>
</div>
</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyW_Go6C-8U8RGtVAd-6q4DFYiEKVFS6SpKqdHvF4u0_Je2DRBaUNXi32pae9UouSTE/exec';
let currentUser = JSON.parse(localStorage.getItem('aruUser') || 'null');

function api(data){
  return fetch(API_URL,{
    method:'POST',
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function showPage(id){
  document.querySelectorAll('.container > div:not(#menu)').forEach(x=>x.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function init(){
  if(currentUser){
    document.getElementById('menu').classList.remove('hidden');
    if(currentUser.role==='ADMIN') document.getElementById('adminBtn').classList.remove('hidden');
    fillProfile();
    setupLevelOptions();
    showPage('requestPage');
  }else{
    showPage('loginPage');
  }
}

function login(){
  api({
    action:'login',
    username:loginUser.value,
    password:loginPass.value
  }).then(res=>{
    if(!res.ok) return alert(res.message);
    currentUser=res.user;
    localStorage.setItem('aruUser',JSON.stringify(currentUser));
    init();
  });
}

function register(){
  api({
    action:'register',
    fullname:regFullname.value,
    orgType:regOrgType.value,
    organization:regFaculty.value,
    phone:regPhone.value,
    lineId:regLine.value,
    username:regUser.value,
    password:regPass.value
  }).then(res=>{
    alert(res.message);
    if(res.ok) showPage('loginPage');
  });
}

function logout(){
  localStorage.removeItem('aruUser');
  location.reload();
}

function fillProfile(){
  pfFullname.value=currentUser.fullname;
  pfOrgType.value=currentUser.orgType;
  pfOrg.value=currentUser.organization;
  pfPhone.value=currentUser.phone;
  pfLine.value=currentUser.lineId;
}

function updateProfile(){
  api({
    action:'updateProfile',
    userId:currentUser.userId,
    fullname:pfFullname.value,
    orgType:pfOrgType.value,
    organization:pfOrg.value,
    phone:pfPhone.value,
    lineId:pfLine.value
  }).then(res=>{
    alert(res.message);
    if(res.ok){
      currentUser.fullname=pfFullname.value;
      currentUser.orgType=pfOrgType.value;
      currentUser.organization=pfOrg.value;
      currentUser.phone=pfPhone.value;
      currentUser.lineId=pfLine.value;
      localStorage.setItem('aruUser',JSON.stringify(currentUser));
    }
  });
}

function setupLevelOptions(){
  const base = ['คณะ - เข้าทั้งคณะ','คณะ - เข้าเฉพาะสาขา'];
  if(currentUser.orgType === 'หน่วยงานภายในมหาวิทยาลัย') base.unshift('มหาวิทยาลัย');
  checkInLevel.innerHTML = base.map(x=>`<option>${x}</option>`).join('');
  passcodeLevel.innerHTML = base.map(x=>`<option>${x}</option>`).join('');
}

function toggleTypes(){
  checkInBox.classList.toggle('hidden', !typeCheckIn.checked);
  passcodeBox.classList.toggle('hidden', !typePasscode.checked);
}

function createRequest(){
  const types=[];
  if(typeCheckIn.checked) types.push('Check-In');
  if(typePasscode.checked) types.push('Passcode');
  if(types.length===0) return alert('กรุณาเลือกประเภทระบบ');

  const pcYears=[...document.querySelectorAll('.pcYear:checked')].map(x=>x.value);

  api({
    action:'createRequest',
    userId:currentUser.userId,
    activityName:activityName.value,
    systemTypes:types,
    activityDate:activityDate.value,
    participants:participants.value,
    startTime:startTime.value,
    endTime:endTime.value,
    place:place.value,

    checkInStart:checkInStart.value,
    checkInEnd:checkInEnd.value,
    checkOutStart:checkOutStart.value,
    checkOutEnd:checkOutEnd.value,
    locationCheckIn:locationCheckIn.value,
    locationCheckOut:locationCheckOut.value,
    checkInDetail:checkInDetail.value,
    banner:banner.value || 'ตรามหาวิทยาลัย',
    checkInLevel:checkInLevel.value,

    passcodeYears:pcYears,
    passcodeLevel:passcodeLevel.value,

    documentLink:documentLink.value,
    hasSchedule:hasSchedule.checked,
    hasStudentList:hasStudentList.checked
  }).then(res=>{
    alert(res.message + (res.requestId ? '\nเลขที่คำขอ: '+res.requestId : ''));
    if(res.ok) loadMyRequests();
  });
}

function loadMyRequests(){
  showPage('myStatusPage');
  api({action:'myRequests',userId:currentUser.userId}).then(res=>{
    if(!res.ok) return alert(res.message);
    myRequests.innerHTML = renderRequests(res.data,false);
  });
}

function loadAdmin(){
  showPage('adminPage');
  api({
    action:'allRequests',
    username:'sam',
    password:'1900'
  }).then(res=>{
    if(!res.ok) return alert(res.message);
    adminRequests.innerHTML = renderRequests(res.data,true);
  });
}

function renderRequests(rows,isAdmin){
  if(!rows.length) return '<p>ยังไม่มีข้อมูล</p>';

  return rows.map(r=>`
  <div class="card">
    <h3>${r['ชื่อกิจกรรม']}</h3>
    <p><b>วันที่จัดกิจกรรม:</b> ${r['วันที่จัดกิจกรรม']}</p>
    <p><b>ประเภทระบบ:</b> ${r['ประเภทระบบ']}</p>
    <p><b>สถานะ:</b> <span class="badge">${r['สถานะ']}</span></p>
    <p><b>หมายเหตุ:</b> ${r['หมายเหตุแอดมิน'] || '-'}</p>

    ${r['สถานะ']==='🟢 ออกรหัสกิจกรรมแล้ว' ? `
      <hr>
      <h4>รายการเอกสาร / ลิงก์ใช้งาน</h4>
      ${r['ประเภทระบบ'].includes('Check-In') ? `
        <p><b>ระบบกิจกรรม Check-In:</b> <a href="${r['ลิงก์ระบบ Check-In'] || 'https://activity.aru.ac.th/'}" target="_blank">เข้าใช้งานระบบ</a></p>
        <p>Check-In: ${r['CheckInStart']} - ${r['CheckInEnd']}</p>
        <p>Check-Out: ${r['CheckOutStart']} - ${r['CheckOutEnd']}</p>
        <p>เข้าใช้งานระบบได้ที่ <a href="https://activity.aru.ac.th/" target="_blank">https://activity.aru.ac.th/</a></p>
      `:''}

      ${r['ประเภทระบบ'].includes('Passcode') ? `
        <p><b>รายชื่อผู้เข้าร่วมกิจกรรม:</b> ${link(r['ลิงก์รายชื่อ Passcode'])}</p>
        <p><b>Passcode:</b> ${link(r['ลิงก์ Passcode'])}</p>
        <p>Passcode มีอายุ 6 วัน โดยกรอกได้ตั้งแต่ ${r['Passcode เริ่ม'] || '-'} จนถึง ${r['Passcode สิ้นสุด'] || '-'}</p>
        <p>เข้าใช้งานระบบได้ที่ <a href="http://sars.aru.ac.th/" target="_blank">http://sars.aru.ac.th/</a></p>
      `:''}
    `:''}

    ${isAdmin ? adminForm(r) : ''}
  </div>
  `).join('');
}

function adminForm(r){
  return `
  <hr>
  <h4>อัปเดตสถานะ</h4>
  <select id="st_${r.RequestID}">
    <option ${r['สถานะ']==='🔵 ส่งคำขอ'?'selected':''}>🔵 ส่งคำขอ</option>
    <option ${r['สถานะ']==='🟡 รับทราบ'?'selected':''}>🟡 รับทราบ</option>
    <option ${r['สถานะ']==='🟢 ออกรหัสกิจกรรมแล้ว'?'selected':''}>🟢 ออกรหัสกิจกรรมแล้ว</option>
    <option ${r['สถานะ']==='🔴 ยกเลิก'?'selected':''}>🔴 ยกเลิก</option>
  </select>
  <textarea id="note_${r.RequestID}" placeholder="หมายเหตุ">${r['หมายเหตุแอดมิน'] || ''}</textarea>
  <input id="cil_${r.RequestID}" placeholder="ลิงก์ระบบ Check-In" value="${r['ลิงก์ระบบ Check-In'] || ''}">
  <input id="psl_${r.RequestID}" placeholder="ลิงก์รายชื่อ Passcode" value="${r['ลิงก์รายชื่อ Passcode'] || ''}">
  <input id="pcl_${r.RequestID}" placeholder="ลิงก์ Passcode" value="${r['ลิงก์ Passcode'] || ''}">
  <label>Passcode เริ่ม</label><input id="pcs_${r.RequestID}" type="datetime-local">
  <label>Passcode สิ้นสุด</label><input id="pce_${r.RequestID}" type="datetime-local">
  <button onclick="updateStatus('${r.RequestID}')">บันทึกสถานะ</button>
  `;
}

function updateStatus(id){
  api({
    action:'updateRequestStatus',
    username:'sam',
    password:'1900',
    requestId:id,
    status:document.getElementById('st_'+id).value,
    adminNote:document.getElementById('note_'+id).value,
    checkInSystemLink:document.getElementById('cil_'+id).value,
    passcodeStudentListLink:document.getElementById('psl_'+id).value,
    passcodeLink:document.getElementById('pcl_'+id).value,
    passcodeStart:document.getElementById('pcs_'+id).value,
    passcodeEnd:document.getElementById('pce_'+id).value
  }).then(res=>{
    alert(res.message);
    if(res.ok) loadAdmin();
  });
}

function link(url){
  return url ? `<a href="${url}" target="_blank">เปิดไฟล์</a>` : '-';
}

init();
</script>
</body>
</html>
