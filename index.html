<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบขอให้ดำเนินการกิจกรรมนักศึกษา</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Prompt", "Sarabun", sans-serif;
      background: linear-gradient(135deg, #e9f7f1, #f8fbff);
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    h1 {
      text-align: center;
      color: #0f684d;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #e5e7eb;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .tab.active {
      background: #0f684d;
      color: white;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #334155;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .card {
      background: #f8fafc;
      padding: 20px;
      border-radius: 18px;
      margin: 20px 0;
      border: 1px solid #e2e8f0;
    }

    .warning {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      font-weight: bold;
    }

    button.submit {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      background: #0f684d;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button.submit:hover {
      background: #0b4f3b;
    }

    .status-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      padding: 20px;
      border-radius: 18px;
    }

    .status-result {
      margin-top: 18px;
      background: white;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #d1fae5;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e40af;
      font-weight: bold;
    }

    a {
      color: #0f684d;
      font-weight: bold;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>ระบบขอให้ดำเนินการกิจกรรมนักศึกษา</h1>
  <div class="subtitle">
    กองพัฒนานักศึกษา มหาวิทยาลัยราชภัฏพระนครศรีอยุธยา
  </div>

  <div class="tabs">
    <button class="tab active" onclick="openTab('requestTab', this)">ส่งคำขอ</button>
    <button class="tab" onclick="openTab('statusTab', this)">ตรวจสอบสถานะ</button>
  </div>

  <div id="requestTab" class="section active">

    <form method="POST" action="https://script.google.com/macros/s/AKfycbyW_Go6C-8U8RGtVAd-6q4DFYiEKVFS6SpKqdHvF4u0_Je2DRBaUNXi32pae9UouSTE/exec">

      <div class="card">
        <h3>ข้อมูลผู้ขอ</h3>

        <div class="grid">
          <div>
            <label>ชื่อ-สกุลผู้ขอ</label>
            <input name="requester" required>
          </div>

          <div>
            <label>หน่วยงาน/คณะ/สาขา</label>
            <input name="department" required>
          </div>

          <div>
            <label>อีเมล</label>
            <input type="email" name="email" required>
          </div>

          <div>
            <label>เบอร์โทรศัพท์</label>
            <input name="phone" required>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>ข้อมูลกิจกรรม</h3>

        <div class="grid">
          <div class="full">
            <label>ชื่อกิจกรรม</label>
            <input name="activityName" required>
          </div>

          <div>
            <label>ประเภทระบบ</label>
            <select name="systemType" id="systemType" onchange="toggleSystem()" required>
              <option value="">-- เลือกประเภทระบบ --</option>
              <option value="Check-In สำหรับชั้นปีที่ 1 รหัส 169">Check-In สำหรับชั้นปีที่ 1 รหัส 169</option>
              <option value="Passcode สำหรับชั้นปีที่ 2-4 รหัส 166-168">Passcode สำหรับชั้นปีที่ 2-4 รหัส 166-168</option>
            </select>
          </div>

          <div>
            <label>ชั้นปี</label>
            <select name="studentYear" id="studentYear" required>
              <option value="">-- เลือกชั้นปี --</option>
              <option value="ชั้นปีที่ 1 รหัส 169">ชั้นปีที่ 1 รหัส 169</option>
              <option value="ชั้นปีที่ 2 รหัส 168">ชั้นปีที่ 2 รหัส 168</option>
              <option value="ชั้นปีที่ 3 รหัส 167">ชั้นปีที่ 3 รหัส 167</option>
              <option value="ชั้นปีที่ 4 รหัส 166">ชั้นปีที่ 4 รหัส 166</option>
            </select>
          </div>

          <div>
            <label>วันที่จัดกิจกรรม</label>
            <input type="date" name="activityDate" id="activityDate" required>
          </div>

          <div>
            <label>จำนวนผู้เข้าร่วม</label>
            <input type="number" name="participants" min="1" required>
          </div>

          <div>
            <label>เวลาเริ่มกิจกรรม</label>
            <input type="time" name="startTime" required>
          </div>

          <div>
            <label>เวลาสิ้นสุดกิจกรรม</label>
            <input type="time" name="endTime" required>
          </div>
        </div>
      </div>

      <div id="checkinSection" class="card" style="display:none;">
        <h3>ข้อมูลระบบ Check-In</h3>

        <div class="warning">
          กิจกรรมสำหรับนักศึกษาชั้นปีที่ 1 รหัส 169 ห้ามขอดำเนินการย้อนหลังทุกกรณี
        </div>

        <div class="grid">
          <div>
            <label>Check-In เริ่มต้น</label>
            <input type="time" name="checkinStart">
          </div>

          <div>
            <label>Check-In สิ้นสุด</label>
            <input type="time" name="checkinEnd">
          </div>

          <div>
            <label>Check-Out เริ่มต้น</label>
            <input type="time" name="checkoutStart">
          </div>

          <div>
            <label>Check-Out สิ้นสุด</label>
            <input type="time" name="checkoutEnd">
          </div>

          <div class="full">
            <label>Location Check-In</label>
            <input name="locationIn" placeholder="เช่น หอประชุมมหาวิทยาลัย / พิกัด Google Map">
          </div>

          <div class="full">
            <label>Location Check-Out</label>
            <input name="locationOut" placeholder="เช่น หอประชุมมหาวิทยาลัย / พิกัด Google Map">
          </div>
        </div>
      </div>

      <div class="card">
        <h3>ระดับกิจกรรมและเอกสาร</h3>

        <div class="grid">
          <div>
            <label>กิจกรรมระดับ</label>
            <select name="activityLevel" required>
              <option value="">-- เลือกระดับกิจกรรม --</option>
              <option>มหาวิทยาลัย</option>
              <option>คณะ - เข้าทั้งคณะ</option>
              <option>คณะ - เข้าเฉพาะสาขา</option>
              <option>สาขา</option>
            </select>
          </div>

          <div class="full">
            <label>รายละเอียดระดับกิจกรรม</label>
            <textarea name="levelDetail" required placeholder="ระบุหน่วยงาน / คณะ / สาขา / รายละเอียดเพิ่มเติม"></textarea>
          </div>

          <div class="full">
            <label>ลิงก์เอกสาร / กำหนดการ / รายชื่อ</label>
            <input name="documentLink" placeholder="วางลิงก์ Google Drive หรือเอกสารที่เกี่ยวข้อง">
          </div>
        </div>
      </div>

      <button class="submit" type="submit">ส่งคำขอ</button>

    </form>
  </div>

  <div id="statusTab" class="section">
    <div class="status-box">
      <h3>ตรวจสอบสถานะคำขอ</h3>

      <label>เลขที่คำขอ</label>
      <input id="searchId" placeholder="เช่น ARU-ACT-2569-0001">

      <button class="submit" type="button" onclick="checkStatus()">ตรวจสอบสถานะ</button>

      <div id="statusResult"></div>
    </div>
  </div>

</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyW_Go6C-8U8RGtVAd-6q4DFYiEKVFS6SpKqdHvF4u0_Je2DRBaUNXi32pae9UouSTE/exec';

function openTab(tabId, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

function toggleSystem() {
  const type = document.getElementById('systemType').value;
  const checkinSection = document.getElementById('checkinSection');
  const studentYear = document.getElementById('studentYear');

  if (type.includes('Check-In')) {
    checkinSection.style.display = 'block';
    studentYear.value = 'ชั้นปีที่ 1 รหัส 169';
  } else {
    checkinSection.style.display = 'none';
  }
}

document.querySelector('form').addEventListener('submit', function(e) {
  const type = document.getElementById('systemType').value;
  const dateValue = document.getElementById('activityDate').value;

  if (type.includes('Check-In')) {
    const today = new Date();
    today.setHours(0,0,0,0);

    const activityDate = new Date(dateValue);
    activityDate.setHours(0,0,0,0);

    if (activityDate < today) {
      e.preventDefault();
      alert('กิจกรรมระบบ Check-In สำหรับชั้นปีที่ 1 รหัส 169 ห้ามขอดำเนินการย้อนหลัง');
      return false;
    }
  }
});

function checkStatus() {
  const id = document.getElementById('searchId').value.trim();

  if (!id) {
    alert('กรุณากรอกเลขที่คำขอ');
    return;
  }

  const callbackName = 'callback_' + Date.now();

  window[callbackName] = function(data) {
    const box = document.getElementById('statusResult');

    if (data.error) {
      box.innerHTML = `
        <div class="status-result">
          <p style="color:red;">${data.message}</p>
        </div>
      `;
      return;
    }

    box.innerHTML = `
      <div class="status-result">
        <p><b>เลขที่คำขอ:</b> ${value(data['เลขที่คำขอ'])}</p>
        <p><b>ชื่อกิจกรรม:</b> ${value(data['ชื่อกิจกรรม'])}</p>
        <p><b>หน่วยงาน:</b> ${value(data['หน่วยงาน'])}</p>
        <p><b>ประเภทระบบ:</b> ${value(data['ประเภทระบบ'])}</p>
        <p><b>วันที่จัดกิจกรรม:</b> ${formatDate(data['วันที่จัดกิจกรรม'])}</p>
        <p><b>สถานะ:</b> <span class="badge">${value(data['สถานะ'])}</span></p>
        <p><b>หมายเหตุ:</b> ${value(data['หมายเหตุ'])}</p>
        <p><b>รหัสกิจกรรม:</b> ${value(data['รหัสกิจกรรม'])}</p>
        <p><b>ลิงก์ Check-In:</b> ${makeLink(data['ลิงก์ Check-In'])}</p>
        <p><b>ลิงก์ Check-Out:</b> ${makeLink(data['ลิงก์ Check-Out'])}</p>
        <p><b>ไฟล์รายชื่อ/Passcode:</b> ${makeLink(data['ลิงก์ไฟล์ Passcode'])}</p>
      </div>
    `;
  };

  const script = document.createElement('script');
  script.src = `${WEB_APP_URL}?requestId=${encodeURIComponent(id)}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function value(v) {
  return v ? v : '-';
}

function makeLink(url) {
  if (!url) return '-';
  return `<a href="${url}" target="_blank">เปิดลิงก์</a>`;
}

function formatDate(d) {
  if (!d) return '-';

  try {
    const date = new Date(d);
    if (isNaN(date)) return d;

    return date.toLocaleDateString('th-TH', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  } catch(e) {
    return d;
  }
}
</script>

</body>
</html>
